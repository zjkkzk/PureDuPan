name: 构建Beta版本

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  build:
    name: 构建Beta APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 解码签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > key.jks

      - name: 授予Gradle执行权限
        run: chmod +x gradlew

      - name: 构建Beta APK
        env:
          RELEASE_STORE_FILE: ../key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleBeta --stacktrace

      - name: 上传Beta APK
        uses: actions/upload-artifact@v4
        with:
          name: PureDuPan-beta
          path: app/build/outputs/apk/beta/*.apk
          retention-days: 90
